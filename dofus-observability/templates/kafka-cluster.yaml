{{- /*
  =============================================================================
  Strimzi Kafka Cluster & Topic — bot_events
  =============================================================================
  Prerequisites: Strimzi Kafka Operator must be installed in the cluster.
  Install via: helm install strimzi-operator oci://quay.io/strimzi-helm/strimzi-kafka-operator
  =============================================================================
*/ -}}
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: dofus-kafka
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: dofus-kafka
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: {{ .Values.kafka.version }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: {{ .Values.kafka.replicas | default 3 }}
      transaction.state.log.replication.factor: {{ .Values.kafka.replicas | default 3 }}
      transaction.state.log.min.isr: 2
      default.replication.factor: {{ .Values.kafka.replicas | default 3 }}
      min.insync.replicas: 2
      log.retention.hours: {{ .Values.kafka.logRetentionHours | default 168 }}
      log.segment.bytes: 1073741824
      auto.create.topics.enable: false
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: dofus-kafka
    app.kubernetes.io/part-of: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.kafka.replicas | default 3 }}
  roles:
    - broker
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.kafka.storage.size }}
        deleteClaim: false
        class: {{ .Values.kafka.storage.storageClass }}
  resources:
    requests:
      memory: {{ .Values.kafka.resources.requests.memory }}
      cpu: {{ .Values.kafka.resources.requests.cpu }}
    limits:
      memory: {{ .Values.kafka.resources.limits.memory }}
      cpu: {{ .Values.kafka.resources.limits.cpu }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: bot-events
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: dofus-kafka
    app.kubernetes.io/part-of: {{ .Chart.Name }}
spec:
  topicName: bot_events
  partitions: {{ .Values.kafka.topic.partitions | default 6 }}
  replicas: {{ .Values.kafka.topic.replicas | default 3 }}
  config:
    retention.ms: {{ .Values.kafka.topic.retentionMs | default 604800000 }}
    cleanup.policy: delete
    segment.bytes: 1073741824
    min.insync.replicas: 2
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: kafka-metrics
  namespace: {{ .Release.Namespace }}
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          broker: "$4:$5"
      - pattern: kafka.server<type=(.+), name=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaBridge
metadata:
  name: dofus-bridge
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  bootstrapServers: dofus-kafka-kafka-bootstrap:9092
  http:
    port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dofus-bridge-external
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 32080 # <-- This is the NEW port your bots will use!
  selector:
    strimzi.io/cluster: dofus-bridge
    strimzi.io/kind: KafkaBridge