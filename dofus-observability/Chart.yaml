apiVersion: v2
name: dofus-observability
description: >-
  Enterprise-grade observability umbrella chart for monitoring a fleet of
  automated Dofus game bots. Integrates Kafka (Strimzi), OpenTelemetry,
  Prometheus, Loki, and Grafana into a unified pipeline.
type: application
version: 1.0.0
appVersion: "1.0.0"
maintainers:
  - name: DevOps Team
    email: devops@dofus-observability.internal

dependencies:
  # Prometheus + Grafana + Alertmanager — full monitoring stack
  - name: kube-prometheus-stack
    version: "65.1.0"
    repository: https://prometheus-community.github.io/helm-charts
    alias: kube-prometheus-stack

  # Loki log aggregation (Promtail disabled — OTel handles log ingestion)
  - name: loki-stack
    version: "2.10.2"
    repository: https://grafana.github.io/helm-charts
    alias: loki-stack
    condition: loki-stack.enabled

  - name: ingress-nginx
    version: "4.15.1"
    alias: ingress-nginx
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled

  - name: strimzi-kafka-operator
    version: "0.51.0"
    alias: strimzi-kafka-operator
    repository: https://strimzi.io/charts
    condition: strimzi-kafka-operator.enabled

  - name: opentelemetry-collector
    version: "0.150.1"
    alias: otel-collector
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: otel-collector.enabled
